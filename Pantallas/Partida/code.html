<span class="font-['Plus_Jakarta_Sans'] font-black text-3xl tracking-tighter text-[#426445] dark:text-[#688C6A]">GeoC</span>

<button class="w-10 h-10 flex items-center justify-center rounded-full text-[#426445] dark:text-[#688C6A] hover:bg-stone-200/50 dark:hover:bg-stone-800/20 transition-colors">

<div>
<span class="font-headline text-on-surface-variant text-sm font-semibold tracking-wide uppercase">Question 4/10</span>
<h2 class="font-headline text-primary text-2xl font-bold tracking-tight">Asia Focus</h2>
</div>
<div class="text-right">
<span class="font-headline text-on-surface-variant text-sm font-semibold tracking-wide uppercase">Score</span>
<div class="font-headline text-3xl font-black text-on-surface">1,450</div>
</div>
</div>
<!-- Question Area (Overhanging/Asymmetric Layout) -->
<section class="relative z-10 mb-12 mt-4 md:pl-12">

<div class="absolute -top-12 -left-8 md:-left-20 w-64 h-64 rounded-full bg-secondary-container opacity-20 blur-3xl -z-10"></div>
<div class="bg-surface-container-lowest p-8 md:p-12 rounded-[2rem] relative shadow-[0_8px_32px_rgba(26,28,27,0.04)] border border-outline-variant/15">
<div class="absolute -top-6 -right-6 md:-right-12">

<circle cx="50" cy="50" fill="none" r="45" stroke="#e2e3e1" stroke-width="6"></circle>
<circle cx="50" cy="50" fill="none" r="45" stroke="#ba1a1a" stroke-dasharray="283" stroke-dashoffset="140" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<span class="font-headline text-3xl font-black text-error">05</span>
</div>
</div>
<h1 class="font-headline text-3xl md:text-5xl font-bold tracking-tighter text-on-surface leading-tight mt-4 pr-12 md:pr-0">
                    ¿Cuál es la capital de Kazajistán?
                </h1>
<p class="font-body text-on-surface-variant text-lg mt-4 max-w-md">

                </p>
</div>
</section>

<button class="bg-surface-container-high hover:bg-surface-dim transition-colors group relative p-6 rounded-xl flex items-center justify-between border border-outline-variant/10 shadow-[0_4px_24px_rgba(26,28,27,0.02)] active:scale-[0.98] duration-200">
<div class="flex items-center gap-4">
<span class="w-8 h-8 rounded-full bg-surface flex items-center justify-center font-headline font-bold text-on-surface-variant group-hover:text-primary transition-colors">A</span>
<span class="font-body text-xl font-medium text-on-surface">Almaty</span>
</div>
</button>
<!-- Answer Option 2 -->

<div class="flex items-center gap-4">
<span class="w-8 h-8 rounded-full bg-surface flex items-center justify-center font-headline font-bold text-on-surface-variant group-hover:text-primary transition-colors">B</span>
<span class="font-body text-xl font-medium text-on-surface">Taskent</span>
</div>
</button>
<!-- Answer Option 3 -->
<button class="bg-surface-container-high hover:bg-surface-dim transition-colors group relative p-6 rounded-xl flex items-center justify-between border border-outline-variant/10 shadow-[0_4px_24px_rgba(26,28,27,0.02)] active:scale-[0.98] duration-200">
<div class="flex items-center gap-4">
<span class="w-8 h-8 rounded-full bg-surface flex items-center justify-center font-headline font-bold text-on-surface-variant group-hover:text-primary transition-colors">C</span>
<span class="font-body text-xl font-medium text-on-surface">Astaná</span>
</div>
</button>
<!-- Answer Option 4 -->
<button class="bg-surface-container-high hover:bg-surface-dim transition-colors group relative p-6 rounded-xl flex items-center justify-between border border-outline-variant/10 shadow-[0_4px_24px_rgba(26,28,27,0.02)] active:scale-[0.98] duration-200">
<div class="flex items-center gap-4">

</button>
<button class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-600 hover:text-[#426445] dark:hover:text-[#688C6A] transition-all w-16">
<span class="material-symbols-outlined mb-1 text-2xl" data-icon="person">person</span>
<span class="font-['Work_Sans'] text-[10px] uppercase tracking-widest font-semibold">Profile</span>
